  <head>

    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary -->
    <title>PoultrySuite Africa — Farm Management System</title>
    <meta name="description" content="PoultrySuite Africa is an integrated farm management platform for poultry production, hatchery operations, and feed-mill production across Africa. Track flocks, mortality, feed, vaccinations, finance, and more." />
    <meta name="keywords" content="poultry, farm management, Africa, Nigeria, hatchery, feed mill, broiler, layer, vaccination, mortality, livestock software" />
    <meta name="author" content="AgoroX" />
    <meta name="application-name" content="PoultrySuite Africa" />
    <meta name="theme-color" content="#1F2937" />
    <meta name="color-scheme" content="light" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PoultrySuite Africa" />
    <meta property="og:title" content="PoultrySuite Africa — Farm Management System" />
    <meta property="og:description" content="Integrated farm management for poultry, hatchery, and feed-mill operations across Africa." />
    <meta property="og:locale" content="en_NG" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="PoultrySuite Africa" />
    <meta name="twitter:description" content="Integrated farm management for poultry producers across Africa." />

    <!-- Mobile / PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PoultrySuite" />

    <!-- Favicon: inline SVG egg mark -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231F2937'/><path d='M16 6c-4 0-7 5-7 11a7 7 0 0 0 14 0c0-6-3-11-7-11z' fill='%23F4C95D'/><path d='M14 14c0-1.5 1-3 2.5-3' stroke='%23B8893B' stroke-width='1.4' stroke-linecap='round' fill='none'/></svg>" />
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231F2937'/><path d='M16 6c-4 0-7 5-7 11a7 7 0 0 0 14 0c0-6-3-11-7-11z' fill='%23F4C95D'/><path d='M14 14c0-1.5 1-3 2.5-3' stroke='%23B8893B' stroke-width='1.4' stroke-linecap='round' fill='none'/></svg>" />

    <!-- SEO -->
    <meta name="robots" content="index, follow" />
  </head>
  <body>
    <div id="root">
      <div class="loading-screen" role="status" aria-live="polite">
        <div class="loading-mark" aria-hidden="true"></div>
        <div class="loading-text">Loading PoultrySuite Africa…</div>
      </div>
    </div>

    <!--
      Diagnostic: if the React app fails to mount within 8 seconds (typical
      mount is <200ms), surface the real reason on screen so the user doesn't
      need to open DevTools. This script removes itself once the React app
      mounts successfully.
    -->
    <script>
      (function () {
        var MOUNT_TIMEOUT_MS = 8000;
        var mountWatcher;
        var lastError = null;

        function showError(title, message, details) {
          var root = document.getElementById('root');
          if (!root) return;
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:#F9FAFB;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;">' +
              '<div style="max-width:560px;width:100%;background:#fff;border:1px solid #E5E7EB;padding:32px 28px;box-shadow:0 1px 3px rgba(0,0,0,.04);">' +
                '<div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#B91C1C;margin-bottom:12px;">App Failed to Load</div>' +
                '<div style="font-size:22px;font-weight:700;color:#111827;letter-spacing:-.3px;line-height:1.25;margin-bottom:10px;">' + title + '</div>' +
                '<div style="font-size:14px;color:#6B7280;line-height:1.6;margin-bottom:18px;">' + message + '</div>' +
                (details
                  ? '<div style="font-size:12px;font-family:Menlo,Monaco,monospace;background:#F9FAFB;padding:12px 14px;border:1px solid #E5E7EB;color:#374151;white-space:pre-wrap;word-break:break-word;max-height:240px;overflow:auto;margin-bottom:18px;">' + details + '</div>'
                  : '') +
                '<button onclick="window.location.reload()" style="background:#1F2937;color:#fff;border:none;padding:11px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Reload page</button>' +
              '</div>' +
            '</div>';
        }

        // Catch any synchronous script errors
        window.addEventListener('error', function (e) {
          lastError = {
            message: e.message || 'Unknown error',
            source: e.filename || '',
            stack: (e.error && e.error.stack) || ''
          };
        });

        // Catch unhandled promise rejections
        window.addEventListener('unhandledrejection', function (e) {
          var reason = e.reason;
          lastError = {
            message: (reason && reason.message) || String(reason) || 'Unhandled promise rejection',
            stack: (reason && reason.stack) || ''
          };
        });

        // Watchdog: if root still shows the loading spinner after 8s, show diagnostics
        mountWatcher = setTimeout(function () {
          var root = document.getElementById('root');
          if (root && root.querySelector('.loading-screen')) {
            // React never replaced the initial children
            if (lastError) {
              showError(
                'A script error stopped the page from loading',
                'The page started loading but a JavaScript error occurred before the app could render. The detail below is the actual error from your browser.',
                (lastError.message || '') +
                  (lastError.source ? '\n\nSource: ' + lastError.source : '') +
                  (lastError.stack ? '\n\n' + lastError.stack : '')
              );
            } else {
              showError(
                "We couldn't find the app bundle",
                "The page loaded but the JavaScript files weren't found. On Cloudflare Pages this usually means the build output folder isn't set to 'dist', or the build didn't run. Check your CF Pages → Settings → Builds & Deployments: Build command must be 'npm run build' and Build output directory must be 'dist'. Then redeploy.",
                'No JS error was captured — the assets folder is most likely 404ing. View page source and search for /assets/ to confirm.'
              );
            }
          }
        }, MOUNT_TIMEOUT_MS);

        // When React mounts, it replaces .loading-screen. Detect that and cancel the watchdog.
        var observer = new MutationObserver(function () {
          var root = document.getElementById('root');
          if (root && !root.querySelector('.loading-screen')) {
            clearTimeout(mountWatcher);
            observer.disconnect();
          }
        });
        var rootEl = document.getElementById('root');
        if (rootEl) observer.observe(rootEl, { childList: true, subtree: true });
      })();
    </script>

    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
